<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Scanner Arsip</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family: Arial;
background:#f1f5f9;
margin:0;
padding:20px;
text-align:center;
}

h2{
margin-bottom:10px;
}

#reader{
width:320px;
margin:auto;
}

.info{
margin-top:15px;
font-size:14px;
color:#475569;
}

</style>

</head>

<body>

<h2>Scan QR Arsip</h2>

<div id="reader"></div>

<div class="info">
Arahkan kamera ke QR Arsip
</div>

<script>

function onScanSuccess(decodedText){

const id = decodedText.trim();

alert("QR terbaca: " + id);

window.location.href =
"https://script.google.com/macros/s/AKfycbxP-WCODMTFxirUFpJ0RTCwuKDu7P4EVaFCYIWNXhHf7RXJbaihX4lQpDUMbMIQK60P9w/exec?q=" + id;

}

function onScanFailure(error){
// ignore
}

const html5QrCode = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

html5QrCode.render(onScanSuccess,onScanFailure);

</script>

</body>
</html>
